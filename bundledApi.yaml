openapi: 3.0.3
info:
  title: Polygon-Parts Manager
  description: CRUD operations to manage polygon parts
  version: 3.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
security: []
paths:
  /polygonParts:
    post:
      deprecated: true
      tags:
        - polygon-parts
      summary: Create new polygon parts
      description: Create new polygon parts
      operationId: createPolygonParts
      requestBody:
        description: Polygon parts metadata payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolygonPartsPayload'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolygonPartsEntityResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    put:
      deprecated: true
      tags:
        - polygon-parts
      parameters:
        - in: query
          name: isSwap
          schema:
            type: boolean
            default: false
          description: Defines if operation is a swap update
      summary: Update an existing polygon parts
      description: Update an existing polygon parts
      operationId: updatePolygonParts
      requestBody:
        description: Polygon parts metadata payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolygonPartsPayload'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolygonPartsEntityResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /polygonParts/exists:
    post:
      tags:
        - polygon-parts
      summary: Check polygon parts entity exists
      description: Check polygon parts entity exists
      operationId: existsPolygonParts
      requestBody:
        description: Polygon parts exists payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExistsPayload'
        required: true
      responses:
        '200':
          description: Polygon parts entity exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolygonPartsEntityResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Polygon parts entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /polygonParts/{polygonPartsEntityName}/find:
    post:
      tags:
        - polygon-parts
      summary: Find and filter polygon parts based on spatial criteria
      description: |
        Search for polygon parts based on spatial intersection with search geometries. Takes a GeoJSON FeatureCollection of search geometries with optional resolution filters.

          **Filter Logic**
          - Returns polygon parts intersecting with input search geometries
          - Resolution filters (`maxResolutionDeg`/`minResolutionDeg`) can be specified in feature properties
          - Input feature IDs are tracked in response via `requestFeatureId`
          - Empty request or empty features array perform unfiltered search
          - With `shouldClip=true` (default):
            - Geometries clipped to search geometries
            - Feature ID maps 1:1 between input and output features via `requestFeatureId`
          - With `shouldClip=false`:
            - Returns original geometries
            - Feature IDs maps 1:many, if part intersects multiple search geometries. responds with an array if there is more than 1 ID map
      operationId: findPolygonParts
      parameters:
        - in: path
          name: polygonPartsEntityName
          description: Polygon parts entity name
          schema:
            $ref: '#/components/schemas/PolygonPartsEntityName'
          required: true
        - in: query
          name: shouldClip
          description: |
            Clips results to search area when true, returns complete geometries when false
          schema:
            type: boolean
            default: true
      requestBody:
        description: Polygon parts find filter
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolygonPartsFindPayload'
        required: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolygonPartsFindResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /polygonParts/{polygonPartsEntityName}/aggregate:
    post:
      tags:
        - polygon-parts
      summary: |
        Get aggregated polygon parts data by polygon parts entity name and polygon parts filter (optional)
      description: |
        Get aggregated polygon parts data by polygon parts entity name and polygon parts filter (optional)
      operationId: aggregationLayerMetadata
      parameters:
        - in: path
          name: polygonPartsEntityName
          description: Polygon parts entity name
          schema:
            $ref: '#/components/schemas/PolygonPartsEntityName'
          required: true
      requestBody:
        description: Aggregation filter (feature collection)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AggregationFilterPayload'
        required: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregationFeature'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /polygonParts/validate:
    post:
      tags:
        - polygon-parts
      summary: Validate polygon parts before insertion
      description: |
        Validates polygon parts data by creating a temporary validation table, inserting the chunk data, and running validation rules. Returns validation errors or empty array if validation passes.
      operationId: validatePolygonParts
      requestBody:
        description: Polygon parts validation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidatePolygonPartsPayload'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    delete:
      tags:
        - polygon-parts
      summary: Delete polygon parts validation entity
      description: Delete polygon parts validation entity
      operationId: deletePolygonPartsValidation
      parameters:
        - in: query
          name: productType
          required: true
          description: Product type key.
          schema:
            $ref: '#/components/schemas/ProductType'
          allowEmptyValue: false
        - in: query
          name: productId
          required: true
          description: Product identifier.
          schema:
            $ref: '#/components/schemas/ProductId'
          allowEmptyValue: false
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /polygonParts/process:
    put:
      tags:
        - polygon-parts
      summary: Process polygon parts validation entity
      description: |
        Process validation data from the temporary validation table into the history and polygon parts tables.
        1. Creates polygon parts and history tables if they don't exist (idempotent operation)
        2. Optionally truncates existing tables if `shouldClearEntities` is set to true (for swap operations)
        3. Moves validation data to the history table
        4. Splits MultiPolygon geometries into individual Polygon records with sequential insertion order
        5. Executes stored procedure to process history data into the polygon parts table
        6. Deletes the validation table after successful processing
        **Note:** This operation is atomic - all steps succeed or fail together within a transaction.
      operationId: process
      requestBody:
        description: Process polygon parts request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessPolygonPartsPayload'
        required: true
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /history:
    put:
      tags:
        - history
      summary: Transfer polygon parts validation entity to history
      description: |
        Moves validation data from the temporary validation table to a history table. If the history table doesn't exist, it will be created. This operation splits MultiPolygons into Polygons and then drops the validation table.
      operationId: moveValidationsToHistory
      parameters:
        - in: query
          name: productType
          required: true
          schema:
            $ref: '#/components/schemas/ProductType'
          allowEmptyValue: false
        - in: query
          name: productId
          required: true
          description: Product identifier.
          schema:
            $ref: '#/components/schemas/ProductId'
          allowEmptyValue: false
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
components:
  schemas:
    AggregationFeature:
      type: object
      description: Aggregation feature
      required:
        - type
        - properties
        - geometry
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - Feature
        geometry:
          type: object
          nullable: true
          anyOf:
            - $ref: '#/components/schemas/Polygon'
            - $ref: '#/components/schemas/MultiPolygon'
        properties:
          type: object
          description: Aggregation feature properties
          nullable: true
          required:
            - imagingTimeBeginUTC
            - imagingTimeEndUTC
            - maxHorizontalAccuracyCE90
            - maxResolutionDeg
            - maxResolutionMeter
            - minHorizontalAccuracyCE90
            - minResolutionDeg
            - minResolutionMeter
            - productBoundingBox
            - sensors
          properties:
            imagingTimeBeginUTC:
              $ref: '#/components/schemas/ImagingTimeBeginUTC'
            imagingTimeEndUTC:
              $ref: '#/components/schemas/ImagingTimeEndUTC'
            maxResolutionDeg:
              allOf:
                - $ref: '#/components/schemas/ResolutionDegree'
                - description: Maximal resolution of layer in degrees/pixel
            minResolutionDeg:
              allOf:
                - $ref: '#/components/schemas/ResolutionDegree'
                - description: Minimal resolution of layer in degrees/pixel
            maxResolutionMeter:
              allOf:
                - $ref: '#/components/schemas/ResolutionMeter'
                - description: Maximal resolution of layer in meters
            minResolutionMeter:
              allOf:
                - $ref: '#/components/schemas/ResolutionMeter'
                - description: Minimal resolution of layer in meters
            maxHorizontalAccuracyCE90:
              allOf:
                - $ref: '#/components/schemas/HorizontalAccuracyCE90'
                - description: Maximal horizontal accuracy
            minHorizontalAccuracyCE90:
              allOf:
                - $ref: '#/components/schemas/HorizontalAccuracyCE90'
                - description: Minimal horizontal accuracy
            productBoundingBox:
              $ref: '#/components/schemas/ProductBBox'
            sensors:
              $ref: '#/components/schemas/Sensors'
    AggregationFilterPayload:
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/RoiFeatureCollection'
      required:
        - filter
      description: Aggregation filter payload by feature collection
    ExistsPayload:
      type: object
      additionalProperties: false
      required:
        - productId
        - productType
      properties:
        productId:
          $ref: '#/components/schemas/ProductId'
        productType:
          $ref: '#/components/schemas/ProductType'
    FeatureCollectionFindResponse:
      type: object
      description: GeoJSON Feature collection
      required:
        - type
        - features
      properties:
        type:
          type: string
          enum:
            - FeatureCollection
        features:
          type: array
          items:
            $ref: '#/components/schemas/FeatureFindResponse'
        bbox:
          $ref: '#/components/schemas/BBox'
    FeatureFindResponse:
      required:
        - type
        - properties
        - geometry
      properties:
        type:
          type: string
          enum:
            - Feature
        id:
          $ref: '#/components/schemas/FeatureId'
        properties:
          $ref: '#/components/schemas/PolygonPartsFindResponseFeatureProperties'
        geometry:
          $ref: '#/components/schemas/Polygon'
        bbox:
          $ref: '#/components/schemas/BBox'
    FeatureId:
      oneOf:
        - type: number
        - type: string
    RoiFeatureCollection:
      type: object
      nullable: true
      description: GeoJSON Feature collection
      required:
        - type
        - features
      properties:
        type:
          type: string
          enum:
            - FeatureCollection
        features:
          type: array
          items:
            $ref: '#/components/schemas/RoiFeaturePayload'
        bbox:
          $ref: '#/components/schemas/BBox'
    RoiFeaturePayload:
      required:
        - type
        - properties
        - geometry
      properties:
        type:
          type: string
          enum:
            - Feature
        id:
          $ref: '#/components/schemas/FeatureId'
        properties:
          type: object
          nullable: true
          properties:
            maxResolutionDeg:
              $ref: '#/components/schemas/ResolutionDegree'
            minResolutionDeg:
              $ref: '#/components/schemas/ResolutionDegree'
        geometry:
          type: object
          oneOf:
            - $ref: '#/components/schemas/Polygon'
            - $ref: '#/components/schemas/MultiPolygon'
        bbox:
          $ref: '#/components/schemas/BBox'
    PartData:
      type: object
      description: Part data
      required:
        - sourceName
        - imagingTimeBeginUTC
        - imagingTimeEndUTC
        - footprint
        - resolutionDegree
        - resolutionMeter
        - sourceResolutionMeter
        - horizontalAccuracyCE90
        - sensors
      properties:
        sourceId:
          $ref: '#/components/schemas/SourceId'
        sourceName:
          $ref: '#/components/schemas/SourceName'
        imagingTimeBeginUTC:
          $ref: '#/components/schemas/ImagingTimeBeginUTC'
        imagingTimeEndUTC:
          $ref: '#/components/schemas/ImagingTimeEndUTC'
        resolutionDegree:
          $ref: '#/components/schemas/ResolutionDegree'
        resolutionMeter:
          $ref: '#/components/schemas/ResolutionMeter'
        sourceResolutionMeter:
          $ref: '#/components/schemas/SourceResolutionMeter'
        horizontalAccuracyCE90:
          $ref: '#/components/schemas/HorizontalAccuracyCE90'
        sensors:
          $ref: '#/components/schemas/Sensors'
        countries:
          $ref: '#/components/schemas/Countries'
        cities:
          $ref: '#/components/schemas/Cities'
        description:
          $ref: '#/components/schemas/Description'
        footprint:
          $ref: '#/components/schemas/Polygon'
    PartsData:
      type: array
      items:
        $ref: '#/components/schemas/PartData'
      minItems: 1
      description: parts data
    PolygonPartsEntityResponse:
      type: object
      description: Polygon parts entity response
      required:
        - polygonPartsEntityName
      properties:
        polygonPartsEntityName:
          $ref: '#/components/schemas/PolygonPartsEntityName'
    PolygonPartsFindPayload:
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/RoiFeatureCollection'
      required:
        - filter
      description: Find polygon parts payload
    PolygonPartsFindResponse:
      allOf:
        - $ref: '#/components/schemas/FeatureCollectionFindResponse'
        - description: Find polygon parts response
    PolygonPartsFindResponseFeatureProperties:
      type: object
      required:
        - catalogId
        - cities
        - countries
        - description
        - horizontalAccuracyCE90
        - id
        - imagingTimeBeginUTC
        - imagingTimeEndUTC
        - ingestionDateUTC
        - partId
        - productId
        - productType
        - productVersion
        - resolutionDegree
        - resolutionMeter
        - sensors
        - sourceId
        - sourceName
        - sourceResolutionMeter
      properties:
        catalogId:
          $ref: '#/components/schemas/LayerId'
        cities:
          oneOf:
            - $ref: '#/components/schemas/Cities'
            - type: object
              nullable: true
        countries:
          oneOf:
            - $ref: '#/components/schemas/Countries'
            - type: object
              nullable: true
        description:
          oneOf:
            - $ref: '#/components/schemas/Description'
            - type: object
              nullable: true
        horizontalAccuracyCE90:
          $ref: '#/components/schemas/HorizontalAccuracyCE90'
        id:
          allOf:
            - $ref: '#/components/schemas/Id'
            - description: Polygon part's identifier
        imagingTimeBeginUTC:
          $ref: '#/components/schemas/ImagingTimeBeginUTC'
        imagingTimeEndUTC:
          $ref: '#/components/schemas/ImagingTimeEndUTC'
        ingestionDateUTC:
          $ref: '#/components/schemas/IngestionDateUTC'
        partId:
          allOf:
            - $ref: '#/components/schemas/Id'
            - description: Part identifier
        productId:
          $ref: '#/components/schemas/ProductId'
        productType:
          $ref: '#/components/schemas/ProductType'
        productVersion:
          $ref: '#/components/schemas/ProductVersion'
        requestFeatureId:
          description: |
            If shouldClip is set to true, only a single FeatureId is returned per Feature. Otherwise, it can return either a single FeatureId or an array of FeatureIds per Feature
          oneOf:
            - $ref: '#/components/schemas/FeatureId'
            - type: array
              items:
                $ref: '#/components/schemas/FeatureId'
        resolutionDegree:
          $ref: '#/components/schemas/ResolutionDegree'
        resolutionMeter:
          $ref: '#/components/schemas/ResolutionMeter'
        sensors:
          $ref: '#/components/schemas/Sensors'
        sourceId:
          oneOf:
            - $ref: '#/components/schemas/SourceId'
            - type: object
              nullable: true
        sourceName:
          $ref: '#/components/schemas/SourceName'
        sourceResolutionMeter:
          $ref: '#/components/schemas/SourceResolutionMeter'
    PolygonPartsPayload:
      type: object
      required:
        - catalogId
        - productId
        - productType
        - productVersion
        - partsData
      properties:
        catalogId:
          $ref: '#/components/schemas/LayerId'
        productId:
          $ref: '#/components/schemas/ProductId'
        productType:
          $ref: '#/components/schemas/ProductType'
        productVersion:
          $ref: '#/components/schemas/ProductVersion'
        partsData:
          $ref: '#/components/schemas/PartsData'
    ErrorMessage:
      type: object
      properties:
        message:
          type: string
        stacktrace:
          type: string
      required:
        - message
    ValidatePolygonPartsPayload:
      type: object
      required:
        - productId
        - catalogId
        - productType
        - productVersion
        - jobType
      properties:
        partsData:
          $ref: '#/components/schemas/PolygonPartsFeatureCollection'
        productId:
          $ref: '#/components/schemas/ProductId'
        catalogId:
          $ref: '#/components/schemas/LayerId'
        productType:
          $ref: '#/components/schemas/ProductType'
        productVersion:
          $ref: '#/components/schemas/ProductVersion'
        jobType:
          type: string
          enum:
            - Ingestion_New
            - Ingestion_Update
            - Ingestion_Swap_Update
    ValidationResponse:
      type: object
      additionalProperties: false
      required:
        - parts
        - smallGeometriesCount
        - smallHolesCount
      properties:
        parts:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - id
              - errors
            properties:
              id:
                type: string
              errors:
                type: array
                items:
                  type: string
        smallGeometriesCount:
          type: integer
        smallHolesCount:
          type: integer
      description: Array of validation results per part (empty array means validation passed)
    ProcessPolygonPartsPayload:
      type: object
      additionalProperties: false
      required:
        - productId
        - productType
      properties:
        productId:
          $ref: '#/components/schemas/ProductId'
        productType:
          $ref: '#/components/schemas/ProductType'
        shouldClearEntities:
          type: boolean
          description: Whether to truncate existing polygon parts and history tables before processing (for swap operations)
          default: false
      description: Process polygon parts request payload
    PolygonPartsFeatureCollection:
      type: object
      nullable: false
      description: GeoJSON Feature collection
      required:
        - type
        - features
      properties:
        type:
          type: string
          enum:
            - FeatureCollection
        features:
          type: array
          items:
            $ref: '#/components/schemas/PolygonPartsFeaturePayload'
        bbox:
          $ref: '#/components/schemas/BBox'
    PolygonPartsFeaturePayload:
      required:
        - type
        - properties
        - geometry
      properties:
        type:
          type: string
          enum:
            - Feature
        properties:
          allOf:
            - $ref: '#/components/schemas/FeatureCollectionPartDataProperties'
          type: object
          nullable: false
        geometry:
          type: object
          oneOf:
            - $ref: '#/components/schemas/Polygon'
            - $ref: '#/components/schemas/MultiPolygon'
        bbox:
          $ref: '#/components/schemas/BBox'
        id:
          oneOf:
            - type: number
            - type: string
          description: feature identifier
          example: '1234'
    FeatureCollectionPartDataProperties:
      type: object
      description: Part data
      required:
        - id
        - sourceName
        - imagingTimeBeginUTC
        - imagingTimeEndUTC
        - resolutionDegree
        - resolutionMeter
        - sourceResolutionMeter
        - horizontalAccuracyCE90
        - sensors
      properties:
        id:
          type: string
          description: Part's identifier
          example: '1111'
        sourceId:
          $ref: '#/components/schemas/SourceId'
        sourceName:
          $ref: '#/components/schemas/SourceName'
        imagingTimeBeginUTC:
          $ref: '#/components/schemas/ImagingTimeBeginUTC'
        imagingTimeEndUTC:
          $ref: '#/components/schemas/ImagingTimeEndUTC'
        resolutionDegree:
          $ref: '#/components/schemas/ResolutionDegree'
        resolutionMeter:
          $ref: '#/components/schemas/ResolutionMeter'
        sourceResolutionMeter:
          $ref: '#/components/schemas/SourceResolutionMeter'
        horizontalAccuracyCE90:
          $ref: '#/components/schemas/HorizontalAccuracyCE90'
        sensors:
          $ref: '#/components/schemas/Sensors'
        countries:
          $ref: '#/components/schemas/Countries'
        cities:
          $ref: '#/components/schemas/Cities'
        description:
          $ref: '#/components/schemas/Description'
    LayerId:
      type: string
      format: uuid
      description: Layer's identifier
      example: c52d8189-7e07-456a-8c6b-53859523c3e9
    ProductId:
      type: string
      pattern: ^[A-Za-z]{1}[A-Za-z0-9_]{0,37}$
      description: Layer's external identifier, must start with a letter and contain only letters, numbers and underscores
      example: BLUE_MARBLE
    ProductType:
      type: string
      enum:
        - Orthophoto
        - OrthophotoHistory
        - OrthophotoBest
        - RasterMap
        - RasterMapBest
        - RasterAid
        - RasterAidBest
        - RasterVector
        - RasterVectorBest
      description: Layer's type, list of raster product types
    ProductVersion:
      type: string
      pattern: ^[1-9]\d*(\.(0|[1-9]\d?))?$
      description: Layer's version
    SourceId:
      type: string
      description: Layer's external identifier
    SourceName:
      type: string
      description: Layer's external name
    ImagingTimeBeginUTC:
      type: string
      description: Oldest imaging date (UTC)
      format: date-time
    ImagingTimeEndUTC:
      type: string
      description: Latest imaging date (UTC)
      format: date-time
    ResolutionDegree:
      type: number
      minimum: 1.67638e-7
      maximum: 0.703125
      format: double
      description: Resolution of layer in degrees/pixel
    ResolutionMeter:
      type: number
      minimum: 0.0185
      maximum: 78271.52
      format: double
      description: Resolution of layer in meters
    SourceResolutionMeter:
      type: number
      minimum: 0.0185
      maximum: 78271.52
      format: double
      description: Resolution of layer in meters
    HorizontalAccuracyCE90:
      type: number
      minimum: 0.01
      maximum: 4000
      format: double
      description: Horizontal accuracy
    Sensors:
      type: array
      items:
        type: string
        pattern: ^([^\s])(.*[^\s])?$
      minItems: 1
      description: Layer's sensors list
    Countries:
      type: array
      items:
        type: string
      description: Countries included in the part
    Cities:
      type: array
      items:
        type: string
      description: Cities included in the part
    Description:
      type: string
      description: Free text describing the part
    Point2D:
      type: array
      maxItems: 2
      minItems: 2
      items:
        type: number
        minimum: -180
        maximum: 180
    BBox:
      type: array
      minItems: 4
      items:
        type: number
      example:
        - -180
        - -90
        - 180
        - 90
    Polygon:
      type: object
      description: GeoJSON Polygon
      externalDocs:
        url: http://geojson.org/geojson-spec.html#id4
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - Polygon
        coordinates:
          type: array
          items:
            type: array
            minItems: 4
            items:
              $ref: '#/components/schemas/Point2D'
        bbox:
          $ref: '#/components/schemas/BBox'
      example:
        type: Polygon
        coordinates:
          - - - -180
              - -90
            - - 180
              - -90
            - - 180
              - 90
            - - -180
              - 90
            - - -180
              - -90
    PolygonPartsEntityName:
      type: string
      description: Polygon parts entity name
      pattern: ^[a-z][a-z0-9_]{0,61}[a-z0-9]$
      example: world_orthophoto
    MultiPolygon:
      type: object
      description: GeoJSON MultiPolygon
      externalDocs:
        url: http://geojson.org/geojson-spec.html#id6
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - MultiPolygon
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              minItems: 4
              items:
                $ref: '#/components/schemas/Point2D'
        bbox:
          $ref: '#/components/schemas/BBox'
      example:
        type: MultiPolygon
        coordinates:
          - - - - -180
                - -90
              - - 0
                - -90
              - - 0
                - 90
              - - -180
                - 90
              - - -180
                - -90
          - - - - 0
                - -90
              - - 180
                - -90
              - - 180
                - 90
              - - 0
                - 90
              - - 0
                - -90
    Id:
      type: string
      format: uuid
      example: d56b406d-e5f2-4818-a525-bd996cae60b5
    IngestionDateUTC:
      type: string
      description: Ingestion date (UTC)
      format: date-time
    ProductBBox:
      type: string
      pattern: ^-?(0|[1-9]\d*)(\.\d*)?,-?(0|[1-9]\d*)(\.\d*)?,-?(0|[1-9]\d*)(\.\d*)?,-?(0|[1-9]\d*)(\.\d*)?$
